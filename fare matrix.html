<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESakayMo - Fare Matrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="proj.js"></script>
</head>
<body>

    <!--NavBar-->
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="https://raw.githubusercontent.com/mariano-9r-ay2526/Q3-Project-GroupNo3/refs/heads/main/ESakayMo%20Logo.png" alt="Logo" height="50" width="50">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                 <li class="nav-item"><a class="nav-link" href="index.html" target="_self">Home</a></li>
                <li class="nav-item"> <a class="nav-link" href="registration.html" target="_self">Registration</a> </li>
                <li class="nav-item"> <a class="nav-link" href="fare matrix.html" target="_self">Fare Matrix</a></li>
                <li class="nav-item"> <a class="nav-link" href="schedule.html" target="_self">Schedule</a></li>
            </ul>
                </ul>
                <button type="button" class="btn btn-outline-info me-2">Book Now</button>
                <button type="button" class="btn btn-primary">Create Account</button>
            </div>
        </div>
    </nav>


    <!-- Fare Matrix-->
    <div id="fare-section" class="container mt-5 p-4 bg-light rounded shadow">
        <h2 class="text-center mb-4">MRT-3 Fare Calculator</h2>
        
        <div class="row align-items-center">
            <div class="col-md-6">
            <div class="mb-3">
                <label class="form-label fw-bold">Pick-up Location:</label>
                    <select class="form-select" id="pickup">
                        <option value="" disabled selected>Select a location</option>
                        <option value="0">North Ave.</option>
                        <option value="1">Quezon Ave.</option>
                        <option value="2">GMA Kamuning</option>
                        <option value="3">Araneta Center-Cubao</option>
                        <option value="4">Santolan-Annapolis</option>
                        <option value="5">Ortigas</option>
                        <option value="6">Shaw Boulevard</option>
                        <option value="7">Boni</option>
                        <option value="8">Guadalupe</option>
                        <option value="9">Buendia</option>
                        <option value="10">Ayala</option>
                        <option value="11">Magallanes</option>
                        <option value="12">Taft Avenue</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Drop-off Location:</label>
                    <select class="form-select" id="dropoff">
                        <option value="" disabled selected>Select a location</option>
                        <option value="0">North Ave.</option>
                        <option value="1">Quezon Ave.</option>
                        <option value="2">GMA Kamuning</option>
                        <option value="3">Araneta Center-Cubao</option>
                        <option value="4">Santolan-Annapolis</option>
                        <option value="5">Ortigas</option>
                        <option value="6">Shaw Boulevard</option>
                        <option value="7">Boni</option>
                        <option value="8">Guadalupe</option>
                        <option value="9">Buendia</option>
                        <option value="10">Ayala</option>
                        <option value="11">Magallanes</option>
                        <option value="12">Taft Avenue</option>
                    </select>
                </div>

                <div class="btn-group w-100 mb-3" role="group">
                    <button type="button" class="btn btn-warning" onclick="regularFare()">Regular Fare</button>
                    <button type="button" class="btn btn-dark" onclick="discountFare()">Discounted Fare</button>
                </div>
            </div>

            <div class="col-md-6">
                <div class="fare-box shadow-sm">
                    <p class="fare-label h4">Estimated Fare:</p>
                    <h1 id="baseFare">₱30.00</h1>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
