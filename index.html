<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Drill 2</title>
    <!-- CSS -->
    <link rel="stylesheet" type="text/css" href="styles.css">
     <!-- Bootstrap -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
      <script src=main.js></script>
</head>
<body>
<br>
<br>
<div class="container">
    <img src="logo.jpg">
    <h1>Welcome to eSakayMo Fare Guide!</h1>
    <h6>Click here for more instructions.</h6>
</div>

    <!-- HERO SECTION -->
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="" alt="Logo" height="50" width="">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggler="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
        <div class="collapse navbar-collapse" id="mynavbar">
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="index.html" target="_self">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html" target="_self">Fare Matrix</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html" target="_self">Schedule</a></li>
        </ul>
        <button type="button" class="btn btn-underline-primary mt-3 m-2">Now</button>
        <button type="button" class="btn btn-primary mt-3 m-2" >Create Account</button>
    </div>
    </nav>

    
    <!-- FARE MATRIX -->
    <div class="container mt-5">
        <div class="main-card">
            <div class="matrix-header mb-4">
                <h1><span style="color:#ff9f1c;">eSakayMo</span> Fare Matrix</h1>
            </div>

            <div class="row align-items-center">
                <div class="col-md-4">
                    <div class="map-container">
                        <img src="https://mapa-metro.com/mapas/Manila/mapa-metro-manila2.png" class="img-fluid rounded shadow-sm" alt="Map">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label fw-bold">PICK UP LOCATION:</label>
                        <select type="text" class="form-control" id="pickup" placeholder="North Ave.">
                            <option value="" disabled selected>Select a location</option>
                            <option value="North Ave.">North Ave.</option>
                            <option value="Quezon Ave.">Quezon Ave.</option>
                            <option value="GMA Kamuning">GMA Kamuning</option>
                            <option value="Araneta Center-Cubao">Araneta Center-Cubao</option>
                            <option value="Santolan-Annapolis">Santolan-Annapolis</option>
                            <option value="Ortigas">Ortigas</option>
                            <option value="Shaw Boulevard">Shaw Boulevard</option>
                            <option value="Boni">Boni</option>
                            <option value="Guadalupe">Guadalupe</option>
                            <option value="Buendia">Buendia</option>
                            <option value="Ayala">Ayala</option>
                            <option value="Magellanes">Magellanes</option>
                            <option value="Taft Ave.">Taft Avenue</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">DROP OFF LOCATION:</label>
                        <select type="" class="form-control" id="dropoff">
                            <option value="">Select a location</option>
                            <option value="North Ave.">North Ave.</option>
                            <option value="Quezon Ave.">Quezon Ave.</option>
                            <option value="GMA Kamuning">GMA Kamuning</option>
                            <option value="Araneta Center-Cubao">Araneta Center-Cubao</option>
                            <option value="Santolan-Annapolis">Santolan-Annapolis</option>
                            <option value="Ortigas">Ortigas</option>
                            <option value="Shaw Boulevard">Shaw Boulevard</option>
                            <option value="Boni">Boni</option>
                            <option value="Guadalupe">Guadalupe</option>
                            <option value="Buendia">Buendia</option>
                            <option value="Ayala">Ayala</option>
                            <option value="Magellanes">Magellanes</option>
                            <option value="Taft Ave.">Taft Avenue</option>
                        </select>
                    </div>
                    <div class="w-50" role="group">
                        <button type="button" class="btn btn-warning" onclick="regularFare()">Regular Fare</button>
                        <button type="button" class="btn btn-dark" onclick="discountFare()">Discounted Fare</button>
                    </div>
                </div>

                <div class="col-md-34">
                    <div class="fare-box">
                        <p class="fare-label">Fare:</p>
                        <h1 id="baseFare">₱30.00</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
<br>
<br>
<br>
<br>
</body>
</html>
